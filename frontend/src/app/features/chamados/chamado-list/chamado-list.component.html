<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Chamados</h1>
      <p class="page-subtitle">Gerencie e visualize todos os tickets do sistema</p>
    </div>
    <button mat-flat-button color="primary" class="create-btn" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon>
      NOVO CHAMADO
    </button>
  </div>

  <mat-card class="table-card glass-panel premium-shadow">
    <mat-card-content>
      
      <div class="filter-header">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Filtrar chamados</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Falha no sistema" #input>
          <mat-icon matPrefix>search</mat-icon>
        </mat-form-field>
      </div>

      <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner></mat-spinner>
      </div>

      <div class="table-container">
        <table mat-table [dataSource]="dataSource" matSort class="full-width-table">

          <!-- ID Column -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
            <td mat-cell *matCellDef="let row"> #{{row.id}} </td>
          </ng-container>

          <!-- Título Column -->
          <ng-container matColumnDef="titulo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Título </th>
            <td mat-cell *matCellDef="let row"> 
              <span class="truncate-text">{{row.titulo}}</span>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
            <td mat-cell *matCellDef="let row"> 
              <span class="custom-chip" [ngClass]="getStatusColor(row.status)">
                {{ row.status.replace('_', ' ') }}
              </span>
            </td>
          </ng-container>

          <!-- Prioridade Column -->
          <ng-container matColumnDef="prioridade">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Prioridade </th>
            <td mat-cell *matCellDef="let row"> 
              <span class="custom-chip" [ngClass]="getPrioridadeColor(row.prioridade)">
                {{ row.prioridade }}
              </span>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef class="actions-col"> Ações </th>
            <td mat-cell *matCellDef="let row" class="actions-col">
              <button mat-icon-button color="primary" matTooltip="Visualizar" (click)="viewChamado(row.id)">
                <mat-icon>visibility</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover-row"></tr>

          <!-- Row shown when there is no matching data. -->
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell no-data" colspan="5" *ngIf="!isLoading">
              Nenhum chamado encontrado.
            </td>
          </tr>
        </table>
      </div>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Selecione a página"></mat-paginator>
    </mat-card-content>
  </mat-card>
</div>
