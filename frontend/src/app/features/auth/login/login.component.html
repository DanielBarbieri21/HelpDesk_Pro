<div class="login-container">
  
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <mat-card class="login-card glass-panel premium-shadow hover-lift">
    <mat-card-header>
      <div mat-card-avatar class="header-image">
        <mat-icon color="primary" class="logo-icon">support_agent</mat-icon>
      </div>
      <mat-card-title>HelpDesk Pro</mat-card-title>
      <mat-card-subtitle>Acesse sua conta</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Ex. admin@helpdesk.com">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            O e-mail é obrigatório.
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Formato de e-mail inválido.
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="togglePasswordVisibility($event)" [attr.aria-label]="'Ocultar senha'">
            <mat-icon>{{hidePassword() ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            A senha é obrigatória.
          </mat-error>
        </mat-form-field>

        <button 
          mat-flat-button 
          color="primary" 
          class="login-button full-width"
          type="submit" 
          [disabled]="loginForm.invalid || isLoading()">
          
          <span *ngIf="!isLoading()">ENTRAR</span>
          <mat-spinner *ngIf="isLoading()" diameter="24" color="accent"></mat-spinner>
        </button>
        
      </form>
    </mat-card-content>
  </mat-card>
</div>
