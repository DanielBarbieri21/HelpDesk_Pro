version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: helpdesk-postgres
    environment:
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk_password
      POSTGRES_DB: helpdesk_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - helpdesk-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: helpdesk-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@helpdesk.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - helpdesk-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: helpdesk-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - helpdesk-network

volumes:
  postgres-data:

networks:
  helpdesk-network:
    driver: bridge
