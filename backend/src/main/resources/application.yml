spring:
  application:
    name: helpdesk
  datasource:
    url: jdbc:postgresql://localhost:5432/helpdesk_db
    username: helpdesk
    password: helpdesk_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/helpdesk_db
    user: helpdesk
    password: helpdesk_password
    baseline-on-migrate: true

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # a day
      refresh-token:
        expiration: 604800000 # 7 days
